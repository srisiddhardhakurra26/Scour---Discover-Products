name: Deploy feedhub to Oracle VM

# feedhub is a separate app that shares this VM with Scour. Scour's Caddy fronts
# both and routes by hostname (feedhub.167-234-217-97.sslip.io). This job clones
# feedhub from its PUBLIC repo onto the VM, builds + starts it on Scour's Docker
# network, makes sure Caddy has the feedhub route, reloads Caddy, and prints
# diagnostics. It reuses the SSH_* secrets already in this (Scour) repo.
#
# Run from the GitHub "Actions" tab → "Deploy feedhub to Oracle VM" →
# "Run workflow". Re-run any time you push changes to the feedhub repo.
on:
  workflow_dispatch:

concurrency:
  group: deploy-feedhub
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy feedhub on the VM
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -se' <<'REMOTE'
          set -euo pipefail
          REPO=https://github.com/srisiddhardhakurra26/feedhub.git
          DIR="$HOME/feedhub"
          HOSTNAME=feedhub.167-234-217-97.sslip.io
          CADDYFILE="$HOME/scour/Caddyfile"

          echo "::group::1. get / update feedhub source"
          if [ -d "$DIR/.git" ]; then
            git -C "$DIR" fetch --depth 1 origin main
            git -C "$DIR" reset --hard FETCH_HEAD
          else
            git clone --depth 1 "$REPO" "$DIR"
          fi
          echo "::endgroup::"

          echo "::group::2. detect Scour's Docker network"
          NET="$(sudo docker network ls --format '{{.Name}}' | grep -E '^scour.*_default$' | head -1 || true)"
          NET="${NET:-scour_default}"
          echo "Scour network: $NET"
          echo "::endgroup::"

          echo "::group::3. write feedhub env (first run only)"
          if [ ! -f "$DIR/.env" ]; then
            {
              echo "APP_PASSWORD=feedhub"
              echo "SESSION_SECRET=$(openssl rand -hex 32)"
              echo "APP_URL=https://$HOSTNAME"
              echo "DATABASE_URL=file:/data/feedhub.db"
              echo "SCOUR_NETWORK=$NET"
            } > "$DIR/.env"
            echo "wrote fresh .env (APP_PASSWORD=feedhub — change it!)"
          elif grep -q '^SCOUR_NETWORK=' "$DIR/.env"; then
            sed -i "s|^SCOUR_NETWORK=.*|SCOUR_NETWORK=$NET|" "$DIR/.env"
          else
            echo "SCOUR_NETWORK=$NET" >> "$DIR/.env"
          fi
          echo "::endgroup::"

          echo "::group::4. build + (re)start feedhub"
          cd "$DIR"
          sudo docker compose up -d --build
          sudo docker image prune -f
          echo "::endgroup::"

          echo "::group::5. fix Caddy config: ensure feedhub route, remove Scour password"
          # feedhub route — add if missing
          if ! grep -q 'feedhub-app:3000' "$CADDYFILE"; then
            printf '\n%s {\n\treverse_proxy feedhub-app:3000\n}\n' "$HOSTNAME" >> "$CADDYFILE"
            echo "appended feedhub block to $CADDYFILE"
          else
            echo "feedhub block already present"
          fi
          # Scour password gate — remove it (owner wants Scour open, no login)
          if grep -q 'basic_auth {' "$CADDYFILE"; then
            sed -i '/^[[:space:]]*basic_auth {/,/^[[:space:]]*}/d' "$CADDYFILE"
            echo "removed basic_auth block from $CADDYFILE"
          else
            echo "no basic_auth block present"
          fi
          echo "--- current Caddyfile ---"; cat "$CADDYFILE"
          echo "::endgroup::"

          echo "::group::6. validate config, then RESTART caddy so it actually loads it"
          # A plain 'caddy reload' was adapting the config but NOT applying it, so the
          # running server kept serving stale routes. Validate first (if the config is
          # bad, abort here WITHOUT restarting, so Scour keeps serving its current
          # config), then restart the caddy container to force a clean load.
          sudo docker compose -f "$HOME/scour/docker-compose.yml" exec -T caddy \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
          echo "config valid — restarting caddy container..."
          sudo docker compose -f "$HOME/scour/docker-compose.yml" restart caddy
          echo "caddy restarted"
          echo "::endgroup::"

          echo "::group::7. diagnostics"
          sleep 10
          echo "-- containers --"
          sudo docker ps --filter name=feedhub-app --filter name=caddy --format '{{.Names}}  {{.Status}}'
          echo "-- can caddy reach feedhub-app:3000? --"
          sudo docker compose -f "$HOME/scour/docker-compose.yml" exec -T caddy \
            wget -q -O /dev/null --timeout=5 http://feedhub-app:3000/ && echo "reachable (HTTP 2xx)" || echo "wget exit non-zero (a redirect/4xx still means the network path works; only DNS/refused = broken)"
          echo "-- caddy logs: feedhub TLS cert issuance / ACME / rate-limit / errors --"
          CADDY="$(sudo docker ps --filter name=caddy --format '{{.Names}}' | head -1)"
          sudo docker logs --tail 150 "$CADDY" 2>&1 | grep -iE 'feedhub|certificate|acme|obtain|rate|error|tls' | tail -40 || true
          echo "-- last 30 lines of feedhub-app logs --"
          sudo docker logs --tail 30 feedhub-app 2>&1 || true
          echo "::endgroup::"

          echo "DONE → https://$HOSTNAME (cert is auto-issued within ~30s of first load)"
          REMOTE
