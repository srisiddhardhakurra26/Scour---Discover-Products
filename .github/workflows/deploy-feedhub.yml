name: Deploy feedhub to Oracle VM

# feedhub is a separate app that shares this VM with Scour. Scour's Caddy fronts
# both and routes by hostname (see Caddyfile: feedhub.167-234-217-97.sslip.io).
# This job clones feedhub from its PUBLIC repo onto the VM, builds it, starts it
# on Scour's Docker network, and reloads Caddy. It reuses the SSH_* secrets that
# already exist in this (Scour) repo, so feedhub needs no secrets of its own.
#
# Run it from the GitHub "Actions" tab â†’ "Deploy feedhub to Oracle VM" â†’
# "Run workflow". Re-run it any time you push changes to the feedhub repo.
on:
  workflow_dispatch:

concurrency:
  group: deploy-feedhub
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone/update feedhub on the VM and (re)deploy
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -se' <<'REMOTE'
          set -euo pipefail
          REPO=https://github.com/srisiddhardhakurra26/feedhub.git
          DIR="$HOME/feedhub"

          # 1. get / update the feedhub source (public repo, no auth needed)
          if [ -d "$DIR/.git" ]; then
            git -C "$DIR" fetch --depth 1 origin main
            git -C "$DIR" reset --hard FETCH_HEAD
          else
            git clone --depth 1 "$REPO" "$DIR"
          fi

          # 2. find the Docker network Scour's Caddy is attached to
          NET="$(sudo docker network ls --format '{{.Name}}' | grep -E '^scour.*_default$' | head -1 || true)"
          NET="${NET:-scour_default}"
          echo "Scour network: $NET"

          # 3. write feedhub's env on first run; keep it (and its session secret)
          #    stable on later runs, only refreshing the network name.
          if [ ! -f "$DIR/.env" ]; then
            SECRET="$(openssl rand -hex 32)"
            {
              echo "APP_PASSWORD=feedhub"
              echo "SESSION_SECRET=$SECRET"
              echo "APP_URL=https://feedhub.167-234-217-97.sslip.io"
              echo "DATABASE_URL=file:/data/feedhub.db"
              echo "SCOUR_NETWORK=$NET"
            } > "$DIR/.env"
            echo "wrote a fresh $DIR/.env (APP_PASSWORD=feedhub â€” change it!)"
          elif grep -q '^SCOUR_NETWORK=' "$DIR/.env"; then
            sed -i "s|^SCOUR_NETWORK=.*|SCOUR_NETWORK=$NET|" "$DIR/.env"
          else
            echo "SCOUR_NETWORK=$NET" >> "$DIR/.env"
          fi

          # 4. build + (re)start feedhub
          cd "$DIR"
          sudo docker compose up -d --build
          sudo docker image prune -f

          # 5. reload Scour's Caddy so the feedhub hostname starts routing
          sudo docker compose -f "$HOME/scour/docker-compose.yml" exec -T caddy \
            caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true

          echo "feedhub deployed â†’ https://feedhub.167-234-217-97.sslip.io"
          REMOTE
