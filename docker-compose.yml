services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # DB lives on the named volume so it survives rebuilds and redeploys.
      DATABASE_URL: file:/data/scour.db
    volumes:
      - scour-data:/data
    expose:
      - "3000"

  # Reverse proxy + automatic HTTPS. With SITE_ADDRESS set to a hostname
  # (a real domain or an <ip>.sslip.io name) Caddy provisions a Let's Encrypt
  # cert automatically. With SITE_ADDRESS=:80 it just serves HTTP on the IP.
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  scour-data:
  caddy-data:
  caddy-config:
