<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Scour extension</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 320px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #141418;
        color: #f4f4f5;
        padding: 14px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 14px;
        font-weight: 700;
      }
      p {
        margin: 0 0 12px;
        font-size: 12px;
        color: #a1a1aa;
        line-height: 1.4;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #d4d4d8;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        border: 1px solid #33333a;
        background: #1a1a1f;
        color: #fafafa;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        outline: none;
      }
      input:focus { border-color: #f0c14b; }
      button {
        margin-top: 10px;
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: #f0c14b;
        color: #141418;
        font-weight: 700;
        font-size: 13px;
        padding: 9px 12px;
        cursor: pointer;
      }
      button:hover { opacity: 0.92; }
      .status {
        margin-top: 8px;
        font-size: 11px;
        color: #86efac;
        min-height: 1em;
      }
      .hint {
        margin-top: 12px;
        font-size: 11px;
        color: #71717a;
        line-height: 1.45;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        color: #d4d4d8;
      }
    </style>
  </head>
  <body>
    <h1>Scour overlay</h1>
    <p>Shows cheaper matches on Amazon, eBay, Etsy, Best Buy product pages.</p>
    <label for="base">Scour base URL</label>
    <input id="base" type="url" placeholder="http://localhost:3000" spellcheck="false" />
    <button id="save" type="button">Save</button>
    <div class="status" id="status"></div>
    <p class="hint">
      Load unpacked from <code>extension/</code> in <code>chrome://extensions</code>.
      Scour must be running at this URL.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
